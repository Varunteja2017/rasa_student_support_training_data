  utter_ask_erp_payment_steps:
  - text: |
      Steps to pay fee through ERP:
      1. Visit the CBIT ERP portal.
      2. Log in using your Student ID and password.
      3. Navigate to 'Fee Payment' section.
      4. Select the semester and fee head.
      5. Verify the amount displayed.
      6. Choose payment method: Net Banking / UPI / Debit-Credit card.
      7. Complete the transaction.
      8. Download and save the payment receipt immediately after success.
      If payment fails, wait 30 minutes before retrying.

