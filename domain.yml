  utter_ask_hall_ticket_not_generated:
  - text: "If your hall ticket hasn't been generated, here are the common reasons and solutions:\n\nPossible Reasons:\n• Fee payment not completed or not updated in system\n• Attendance below 75% (no condonation available)\n• Pending academic or disciplinary holds\n• Technical issues in the portal\n\nWhat to do:\n1. Check your fee receipt in ERP - confirm payment is updated\n2. Verify your attendance percentage with the academic office\n3. Visit Administrative Counter with your Student ID and fee receipt\n4. Check if there are any pending issues or holds\n5. Visit at least 5 days before exams\n\nContact Info:\n• Examination Cell: 040-24193262\n• Admissions: 040-24193276\n\nIf your fee was paid but hall ticket isn't generated, please create a support ticket and our team will investigate immediately."
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_ask_payment_failed_money_deducted:
  - text: "If your payment failed but money was deducted from your account, here's what to do:\n\nStep 1: Don't Panic - Follow These Steps\n• Payment failures can take 3-5 business days to reverse\n• Check your bank account after 5 days\n• Money may be returned automatically\n\nStep 2: If Money Isn't Returned Within 5 Days\n• Contact your bank's customer support immediately\n• Provide them with:\n  - Transaction ID\n  - Date and time of transaction\n  - Amount deducted\n  - Screenshots of both bank statement and failed payment confirmation\n\nStep 3: Contact CBIT\n• Visit Administrative Counter with transaction proof\n• Show the error message and bank statement\n• Request manual refund/reversal if bank cannot help\n\nStep 4: Retry Payment\n• Once money is refunded (takes 3-7 business days from bank)\n• Pay fees again through:\n  - ERP Portal (recommended - instant confirmation)\n  - Administrative Counter (direct payment)\n  - DD (Demand Draft)\n\nContact Info:\n• Administrative Counter: 040-24193276/77/78\n• College Email: accounts@cbit.ac.in\n• Working Hours: 9 AM - 5 PM (Mon-Sat)\n\nPro Tip: Use net banking or UPI for faster resolution if payment fails again."
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_fee_payment_failure:
  - text: "Your fee payment couldn't be processed. Here's how to resolve this:\n\nImmediate Steps:\n• Check your internet connection - this is often the cause\n• Verify your card/account has sufficient balance\n• Ensure your card is not blocked or expired\n\nIf Payment Failed:\n• Wait 5-10 minutes and try again\n• Try a different payment method (UPI, different card, net banking)\n• If using net banking, check your bank's website for any blocks\n\nError Messages:\n• \"Insufficient Balance\" - check account balance\n• \"Card Declined\" - contact your bank\n• \"Gateway Timeout\" - retry after 10 minutes\n• \"Transaction Failed\" - contact support\n\nImportant: Check if money was deducted even though payment failed. If yes, follow refund process.\n\nAlternative Payment Methods:\n1. ERP Portal: Net Banking, UPI, Credit/Debit Card\n2. Administrative Counter: Direct cash or DD (9 AM - 5 PM, Mon-Sat)\n3. Counter 1: For 1st-2nd year students\n4. Counter 2: For 3rd-4th year students\n\nIf Problem Persists:\n• Contact: 040-24193276/77/78\n• Email: accounts@cbit.ac.in\n• Visit counter with Student ID\n\nNeed Help? Create a support ticket and our team will assist within 24 hours."
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_fee_receipt_issue:
  - text: "If you're having issues with your fee receipt, here's what to do:\n\nReceipt Not Generated After Payment:\n• Login to ERP portal with your credentials\n• Go to Fee Payment section\n• Click 'Download Receipt' or 'View Receipt'\n• Receipt may take 5-10 minutes to generate\n• If still not visible after 1 hour, refresh the page\n\nReceipt Not Downloading:\n• Clear browser cache and cookies\n• Try a different browser\n• Disable any ad blockers or pop-up blockers\n• Check if your browser has download restrictions\n\nReceipt Not Generated After Failed Payment:\n• Failed payments don't generate receipts\n• Once payment succeeds, receipt will be auto-generated\n• Retry payment and check immediately after success\n\nLost or Damaged Receipt:\n• Visit Administrative Counter to request duplicate\n• Bring your Student ID card\n• Pay ₹50 fee for duplicate receipt\n• Duplicate receipt issued on same day or within 1-2 days\n\nReceipt Shows Wrong Amount/Details:\n• Screenshot the incorrect receipt\n• Visit Administrative Counter with Student ID\n• Request correction (takes 1-2 weeks)\n\nReceipt Not Visible in System:\n• Check your ERP login credentials\n• Use correct semester for receipt download\n• Contact college accounts team if payment was done offline\n\nContact Info:\n• Administrative Counter: 040-24193276/77/78\n• Counter 1: For 1st-2nd year students\n• Counter 2: For 3rd-4th year students\n• Hours: 9 AM - 5 PM (Mon-Sat), Lunch: 1-2 PM\n• Email: accounts@cbit.ac.in"
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
