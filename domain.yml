      2) Take a screenshot of the payment proof (transaction ID, date, amount).
      3) Visit the Administration Counter (Counter 1 for 1st-2nd year, Counter 2 for 3rd-4th year) immediately.
      4) Show your fee payment proof along with your student ID.
      5) The accounts team will verify and manually update records. Do this as soon as possible.

