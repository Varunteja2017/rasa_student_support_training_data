        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_anything_else:
  - text: "Is there anything else I can help you with?"
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_default:
  - text: "I'm here to help with CBIT admissions, fees, documents, exams, and technical issues. What would you like to know?"

    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  # ADMISSION ANSWERS
  utter_admission_procedure:
  - text: "📋 CBIT Admission Procedure:\n\nFor B.Tech: Apply through TS EAMCET counseling at tgeapcet.nic.in, select CBIT (Code: CBIT), attend with original certificates.\n\nFor M.Tech: Through TGPGCET/GATE counseling.\n\nFor MBA: Through TGICET counseling.\n\nManagement Quota: Direct admission available (limited seats) - visit admission office.\n\n📞 Admission Office: 040-24193276\n📧 admissions@cbit.ac.in"
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_eligibility_criteria:
  - text: "Eligibility Criteria:\n\nB.Tech: 45% in 10+2 (40% for SC/ST/BC). Qualified in TS EAMCET/JEE Mains.\n\nM.Tech: B.Tech degree with valid GATE/TGPGCET score.\n\nMBA: Bachelor's degree with valid TGICET score.\n\nManagement Quota B.Tech: Min 45% in Intermediate (PCM), qualified in EAMCET/JEE."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_admission_eligibility:
  - text: "Eligibility Criteria:\n\nB.Tech: 45% in 10+2 (40% for SC/ST/BC). Qualified in TS EAMCET/JEE Mains.\n\nM.Tech: B.Tech degree with valid GATE/TGPGCET score.\n\nMBA: Bachelor's degree with valid TGICET score.\n\nManagement Quota B.Tech: Min 45% in Intermediate (PCM), qualified in EAMCET/JEE."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_entrance_exam:
  - text: "Entrance Exams:\n\n✅ B.Tech: TS EAMCET / JEE Mains\n✅ M.Tech: GATE or TGPGCET\n✅ MBA: TGICET\n\nAll admissions are merit-based through state counseling. Approximate cutoffs - CSE: 500-5000, ECE: 3000-15000, EEE: 5000-20000."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_admission_dates:
  - text: "Admission Schedule:\n\nAdmissions follow TS EAMCET/TGPGCET counseling schedule, typically during July-August. Counseling is conducted in multiple rounds. Registration opens after results are declared. Contact Admission Office for specific dates: 040-24193276"

    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  # FEE ANSWERS
  utter_fee_structure:
  - text: "B.Tech annual fee is ₹2,30,000 (excluding exam fees). M.Tech: ₹XXXX per year. MBA: ₹XXXX per year."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_fee_payment_method:
  - text: "💳 Fee Payment Methods:\n\nOnline Payment (Recommended):\n1. Login to student portal (erp portal)\n2. Go to Fee Payment section\n3. Pay via Net Banking, UPI, Debit/Credit Cards\nProcess:\n1. Visit Accounts Office (Room 105, Admin Block)\n2. Request fee payment with your Roll Number\n3. Fill with your details\n4. Pay via UPI/Cash in favor of 'CBIT' (mention your Roll No. as note in UPI)\n5. Submit paid voucher to Accounts Office\n\nImportant Notes:\n• Submit before due date to avoid late fee\n• For cheques: ensure clearance before deadline\n\nOffline Payment:\nDemand Draft/Cheque in favor of 'CBIT' payable at Hyderabad\n\n📞 Accounts Office: 040-24193266\n⏰ Office Hours: 9:30 AM - 4:30 PM (Mon-Sat)"
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_fee_payment_deadline:
  - text: "📅 Fee Payment Deadlines:\n\nOdd Semester (1st, 3rd, 5th, 7th): Last date is 15th August. Late payment with fine until 31st August.\n\nEven Semester (2nd, 4th, 6th, 8th): Last date is 15th January. Late payment with fine until 31st January.\n\nFor 6th semester specifically: The last date is 15th January (with late fee accepted until 31st January).\n\n⚠️ Late fine: ₹500 (1-7 days), ₹1,000 (8-15 days), ₹2,000 (16-30 days). Fee payment is mandatory to download hall ticket!"
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_fee_receipt:
  - text: "Download fee receipt from student portal: Login → Payment History → Enter the payment id received in messages → Download. If not visible after 2 hours, clear cache and re-login. For issues, visit Accounts Section: Counter 1 for 1st and 2nd year students and Counter 2 for 3rd and 4th year students."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_fee_refund:
  - text: "Fee refund processed as per college policy. Submit application to Accounts office with fee receipt and reason. Processing takes 30-45 days."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_installment_payment:
  - text: "No, fees cannot be paid in installments. No late fee if paid within due dates. Your payment schedule is available in the student portal under Fee Details."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_late_fee_fine:
  - text: "Late fee: ₹500 per day after due date . Semester exams blocked if fee dues exist. Pay immediately through ERP or Accounts office to avoid penalties."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_scholarship_fee:
  - text: "Fee reimbursement available for eligible students (SC/ST/BC/EBC/Minority). Apply through TS ePass portal. Provide all required documents to Scholarship Section."

    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_fee_payment_ways:
  - text: "Fee payment methods: 1) Online via ERP (most common), 2) Offline at Accounts Counter with challan, 3) Bank transfer. Online payment is instant and you get receipt immediately."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_epas_payment_steps:
  - text: "EPAS payment steps: 1) Login with your ID, 2) Go to Fees section, 3) Select semester to pay, 4) Choose payment method (online/offline), 5) Enter amount and proceed. Online payment processes instantly."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_fee_payment_confirmation:
  - text: "Fee payment confirmation: After online payment, check your email for receipt. Log into ERP/EPAS and verify under 'Payment History'. If not updated within 1 hour, contact Accounts office."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_late_fee_penalty:
  - text: "Late fee penalty: ₹500 per day after due date. Semester exams will be blocked if fees are not paid. Pay immediately to avoid penalties. Check your fee portal for exact due date."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_fee_paid_not_updated:
  - text: "If fee paid but not shown in ERP: 1) Wait 24 hours (payment may be processing), 2) Check your bank to confirm debit, 3) Look for payment receipt email, 4) Visit Accounts Counter with proof of payment, 5) They'll update manually if needed."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_epas_login_issue:
  - text: "EPAS login issues: 1) Use your student ID (not email), 2) Password is your DOB in DDMMYYYY format (default), 3) Clear browser cache and try again, 4) Use Chrome/Firefox browsers, 5) Contact IT help desk if still not working."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_erp_login:
  - text: "ERP login issues: 1) Use your student ID (not name) as username, 2) Default password is your DOB in DDMMYYYY format, 3) Clear browser cookies and cache, 4) Try incognito/private mode, 5) Use Chrome or Firefox browsers, 6) Contact IT support (ext: 2345) if problem persists."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_download_fee_receipt:
  - text: "Download fee receipt: 1) Login to ERP with student ID, 2) Go to 'Payments' section, 3) Find your payment transaction, 4) Click 'Download Receipt' button. Receipt is in PDF format. Print or email for records."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_lost_receipt_recovery:
  - text: "Lost fee receipt? 1) Try downloading from ERP (available for 5 years), 2) Visit Accounts Counter with student ID and fee details, 3) Request duplicate/reprint receipt, 4) Processing time: same day. Small charges may apply (usually free)."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_scholarship_fee_adjustment:
  - text: "Scholarship adjustment: SC/ST and EBC scholarships are auto-deducted from your fee. You'll see scholarship credit in fee structure. If not showing, contact Accounts office within 7 days of fee due date with scholarship approval letter."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  # DOCUMENT ANSWERS
  utter_bonafide_certificate:
  - text: "Apply at Counter Section. Required: ID card, 50 ruppees.Once payment is done, you'll have to submit the form to respective counter (Counter 1 for 1st and 2nd year students and Counter 2 for 3rd and 4th year students). Processing time: 1-2 working days. Collect during office hours (10 AM - 5 PM)."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_transfer_certificate:
  - text: "Apply at AEC office after course completion. Required: All dues clearance, library clearance, ID card submission. Processing: 7-10 days."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_marks_memo:
  - text: "Original marks memo issued after respective semester results. Duplicate memo: Apply at AEC office with ₹300 fee. Processing: 15-20 days."
 
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  # EXAMINATION ANSWERS
  utter_exam_schedule:
  - text: "📅 Exam Schedule:\n\nMid-1: 4th-5th week (September/February)\nMid-2: 10th-11th week (November/April)\nSemester End: December/May\n\nExact dates are available in student portal → Academics → Exam Schedule. Updates are also posted in respective class groups."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_hall_ticket:
  - text: "📄 Hall Ticket:\n\nDownload from student portal 1 week before exams.\n\nRequirements:\n✅ 75% attendance\n✅ Fee payment completed\n\nNot visible?\n- View your attendance (Portal → Attendance)\n- Confirm fee payment status\n- Upload photo if missing\n- Contact Examinations: 040-24193262"
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_exam_results:
  - text: "📊 Results:\n\nInternal marks: Published within 2 months of semester exams in student portal\nPass Criteria: 40/100 overall (min 28/70 external)\n\nLogin to erp portal → Overall Marks Result → Results."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_results:
  - text: "📊 Results:\n\nInternal marks: Published within 2 months of semester exams in student portal\nPass Criteria: 40/100 overall (min 28/70 external)\n\nLogin to erp portal → Overall Marks Result → Results."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_revaluation:
  - text: "🔄 Revaluation Process:\n\n1. Apply within 10 days of result in erp portal\n2. Fee: ₹700 per subject\n3. Results in 30-45 days\n5. Success rate: 15-20%\n\nTypically marks increase by 3-8 marks if successful."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_supplementary_exam:
  - text: "📝 Supplementary Exams:\n\nFor failed subjects. Conducted 2-3 months after regular exams.\n\nProcess:\n1. Register in student portal\n2. Pay ₹1,500 per subject\n3. Download hall ticket\n4. Appear for exam\n\nDates are announced on AEC notice board and student portal."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_exam_attendance:
  - text: "📊 Attendance Requirement:\n\nMandatory: 75% attendance for exam eligibility\n\nCondonation (65-75%):\n- Apply with medical certificate\n- Fee: ₹500 per subject\n- Academic Council approval needed\n\nBelow 65%: Detained, cannot appear for exams.\n\nContact: 040-24193262"

    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  # CONTACT & OFFICE ANSWERS
  utter_contact_info:
  - text: "📞 CBIT Contact Information:\n\n📍 Chaitanya Bharathi Institute of Technology\nGandipet, Hyderabad - 500075\n\n☎️ Main: 040-24193276/77/78\n📧 principal@cbit.ac.in\n\nDepartment Contacts:\n- Admissions: 040-24193276\n- Examinations: 040-24193262\n- Accounts: 040-24193266\n- Placements: 040-24193288"
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_office_hours:
  - text: "⏰ Office Hours:\n\nMonday-Saturday: 9:30 AM - 4:30 PM\nClosed: Sundays and public holidays\n\nLunch Break: 1:00 PM - 1:30 PM\n\nEmergency: Contact security at main gate"
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_department_contact:
  - text: "Contact respective HODs during office hours. Email format: hod_dept@cbit.ac.in (e.g., hod_cse@cbit.ac.in). Main office: 8466997201 for department extensions."

    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  # TECHNICAL ISSUES ANSWERS
  utter_technical_issue_erp:
  - text: "🖥️ Student Portal Login Issues:\n\nUsername: Your roll number\nDefault Password: Roll No\n\nProblems?\n- Forgot password → Use 'Forgot Password' with roll no + email\n- Account locked → Wait 30 min or visit respective dept\n- Wrong credentials 5 times = locked\n\nVisit Department heads with ID card.\nOffice: 9:30 AM - 4:30 PM"
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_technical_issue_email:
  - text: "📧 College Email Issues:\n\nEmail ID: rollnumber@cbit.org.in\nAccess: Login at mail.google.com\n\nPassword Reset:\n1. Visit Department heads with ID card\n2. Fill reset form\n3. New password issued immediately\n\nCommon issues:\n- Storage full → Delete old emails\n- Can't send → Check recipient address\n\nIT Support: CC1 Building, 9:30 AM - 4:30 PM"

    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"

  utter_anti_ragging:
  - text: "CBIT is strict anti-ragging campus. Report incidents immediately to: Anti-Ragging Cell , Principal, or Dean Student Affairs. Anonymous complaints accepted. 24/7 helpline available."
   
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  # TICKET ANSWERS
  utter_my_tickets:
  - text: "You can view all your support tickets in the 'My Tickets' section. Each ticket shows current status, priority, category, and assigned staff. Track progress and updates easily."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_ticket_status:
  - text: "Ticket statuses: Open (newly created), In Progress (being worked on), Resolved (issue fixed), Closed (completed). You'll receive notifications on status changes."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
      - title: "❓ Ask another question"
        payload: "/ask_custom_question"
  utter_create_ticket:
  - text: "Create a new support ticket by: 1) Click 'Create Ticket' button, 2) Select category (Academic, Administrative, Technical, etc.), 3) Add title and detailed description, 4) Choose priority level, 5) Submit. You'll get a ticket ID for tracking."
  
    buttons:
      - title: "🏠 Back to main menu"
        payload: "/select_menu_root"
