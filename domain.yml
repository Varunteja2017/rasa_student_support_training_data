  utter_ask_fee_payment_ways:
  - text: |
      Two ways to pay fees at CBIT:
      1. Online via ERP Portal: Visit the CBIT ERP portal, log in with your student credentials, pay using net banking, UPI, or debit/credit card.
      2. Offline at Administration Counter: Visit Counter 1 (1st & 2nd year) or Counter 2 (3rd & 4th year) with cash or DD.

