  utter_ask_lateral_entry:
  - text: |
      Lateral entry is for diploma holders or B.Sc graduates seeking direct admission into 2nd year (3rd semester) of B.Tech. Requirements: ECET Rank Card, Diploma/B.Sc Marks Memos (all semesters), Transfer Certificate, Conduct Certificate, Aadhaar Card, Caste Certificate (if applicable), and passport photos. Admission is through TS ECET counseling. Visit the admissions counter at CBIT with documents after receiving your ECET allotment order.

