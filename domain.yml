  utter_ask_my_tickets:
  - text: "📋 Your Support Tickets\n\nYou can view all your submitted or active support tickets in the Tickets section of the mobile app. Your ticket history shows:\n\n• Ticket ID - Unique ticket reference number\n• Status - Open, In Progress, or Resolved\n• Category - Academic, Payment, Technical, or Other\n• Date Created - When the ticket was submitted\n• Latest Update - Most recent response from support team\n\nTo view tickets, open the app and navigate to the Tickets section. Click on any ticket to see full details and updates."
