  - rule: map services button to submenu
    steps:
      - intent: choose_services
      - action: utter_services_menu

  - rule: map counters button to submenu
    steps:
      - intent: choose_counters
      - action: utter_counters_menu

  - rule: map placements button to submenu
    steps:
      - intent: choose_placements
      - action: utter_placements_menu

  - rule: map tickets button to submenu
    steps:
      - intent: choose_tickets
      - action: utter_tickets_menu

  - rule: map campus info to submenu
